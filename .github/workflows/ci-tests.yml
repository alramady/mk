name: MK Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test

jobs:
  # ── Type Check ────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  # ── Golden / Snapshot Tests ───────────────────────────────────────
  test-golden:
    name: Golden Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:golden

  # ── Widget / Component Tests ──────────────────────────────────────
  test-widget:
    name: Widget Tests (jsdom)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:widget

  # ── Integration Tests ─────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  # ── Memory Leak Analysis ──────────────────────────────────────────
  test-memory:
    name: Memory Leak Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:memory

  # ── Firebase / Analytics Tests ────────────────────────────────────
  test-firebase:
    name: Firebase / Analytics Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:firebase

  # ── Existing Server Tests ─────────────────────────────────────────
  test-server:
    name: Server Tests (existing)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:server
        continue-on-error: true  # Some pre-existing tests may fail without DB/Redis

  # ── Summary Gate ──────────────────────────────────────────────────
  test-gate:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - test-golden
      - test-widget
      - test-integration
      - test-memory
      - test-firebase
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.typecheck.result }}" == "failure" ]] || \
             [[ "${{ needs.test-golden.result }}" == "failure" ]] || \
             [[ "${{ needs.test-widget.result }}" == "failure" ]] || \
             [[ "${{ needs.test-integration.result }}" == "failure" ]] || \
             [[ "${{ needs.test-memory.result }}" == "failure" ]] || \
             [[ "${{ needs.test-firebase.result }}" == "failure" ]]; then
            echo "❌ One or more required test jobs failed"
            exit 1
          fi
          echo "✅ All required test jobs passed"
